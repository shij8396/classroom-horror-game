<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>上课偷玩手机 - 恐怖小游戏</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  overflow: hidden; 
  background: #000; 
  font-family: 'Microsoft YaHei', sans-serif;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}
canvas { display: block; }

/* 开始界面 */
#startScreen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(180deg, #0a0a0a 0%, #1a0a0a 50%, #0a0a0a 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 1000;
  transition: opacity 0.8s;
}
#startScreen.hidden { opacity: 0; pointer-events: none; }
#startScreen h1 {
  font-size: 2.5em; color: #cc0000;
  text-shadow: 0 0 20px #ff0000, 0 0 40px #880000;
  margin-bottom: 20px;
  animation: flicker 3s infinite;
}
@keyframes flicker {
  0%, 95%, 100% { opacity: 1; }
  96% { opacity: 0.4; }
  97% { opacity: 1; }
  98% { opacity: 0.6; }
}
#startScreen .subtitle {
  color: #888; font-size: 1em; margin-bottom: 40px;
  text-align: center; line-height: 1.8; padding: 0 20px;
}
#startScreen .rules {
  color: #666; font-size: 0.85em; margin-bottom: 30px;
  text-align: left; line-height: 2; padding: 15px 25px;
  border: 1px solid #333; border-radius: 8px;
  background: rgba(255,255,255,0.02);
}
#startScreen .rules span { color: #cc4444; }
#startBtn {
  padding: 15px 60px; font-size: 1.3em;
  background: linear-gradient(135deg, #8b0000, #cc0000);
  color: #fff; border: none; border-radius: 30px;
  cursor: pointer; transition: all 0.3s;
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  box-shadow: 0 0 20px rgba(204,0,0,0.3);
}
#startBtn:hover, #startBtn:active {
  transform: scale(1.05);
  box-shadow: 0 0 30px rgba(204,0,0,0.5);
}

/* HUD */
#hud {
  position: fixed; top: 0; left: 0; width: 100%; padding: 15px;
  display: flex; justify-content: space-between; align-items: flex-start;
  z-index: 100; pointer-events: none;
}
#hud.hidden { display: none; }
.hud-item {
  background: rgba(0,0,0,0.6); color: #ddd; padding: 8px 16px;
  border-radius: 20px; font-size: 0.9em;
  backdrop-filter: blur(5px);
}
#score { color: #ffcc00; }
#dangerLevel {
  position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
  z-index: 100; pointer-events: none;
  font-size: 1.2em; color: #ff4444;
  text-shadow: 0 0 10px #ff0000;
  opacity: 0; transition: opacity 0.3s;
}
#dangerLevel.show { opacity: 1; }

/* 手机界面 */
#phoneUI {
  position: fixed; bottom: 20px; right: 20px;
  width: 120px; height: 200px;
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border-radius: 15px; border: 3px solid #333;
  z-index: 90; display: none;
  overflow: hidden;
  box-shadow: 0 0 20px rgba(0,100,255,0.2);
}
#phoneUI.show { display: block; }
#phoneScreen {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: #fff; font-size: 0.7em;
}
#phoneScreen .app-icon {
  width: 40px; height: 40px; margin: 5px;
  background: #444; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5em;
}
#phoneScreen .time {
  font-size: 1.8em; margin: 10px 0;
  color: #88ccff;
}

/* 提示信息 */
#toast {
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.8); color: #fff;
  padding: 10px 25px; border-radius: 20px;
  font-size: 0.9em; z-index: 200;
  opacity: 0; transition: opacity 0.3s;
  pointer-events: none;
}
#toast.show { opacity: 1; }

/* 游戏结束界面 */
#gameOverScreen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.95);
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 2000;
}
#gameOverScreen.show { display: flex; }
#gameOverScreen h2 {
  font-size: 2.5em; color: #cc0000;
  text-shadow: 0 0 20px #ff0000;
  margin-bottom: 20px;
}
#gameOverScreen .stats {
  color: #aaa; font-size: 1.1em; line-height: 2;
  margin-bottom: 30px; text-align: center;
}
#gameOverScreen .stats span { color: #ffcc00; }
#restartBtn {
  padding: 12px 50px; font-size: 1.1em;
  background: linear-gradient(135deg, #8b0000, #cc0000);
  color: #fff; border: none; border-radius: 30px;
  cursor: pointer; transition: all 0.3s;
}
#restartBtn:active { transform: scale(0.95); }

/* JumpScare覆盖层 */
#jumpScareOverlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 5000; display: none;
  background: #000;
  align-items: center; justify-content: center;
}
#jumpScareOverlay.show { display: flex; }
#jumpScareFace {
  font-size: 15em;
  animation: jumpScareAnim 0.5s ease-out;
  filter: contrast(2) brightness(0.8);
}
@keyframes jumpScareAnim {
  0% { transform: scale(5) rotate(-10deg); opacity: 0; }
  30% { transform: scale(1.2) rotate(5deg); opacity: 1; }
  50% { transform: scale(1.5) rotate(-3deg); }
  70% { transform: scale(1.1) rotate(2deg); }
  100% { transform: scale(1) rotate(0deg); }
}

/* 触屏提示 */
#touchHint {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.3); font-size: 0.8em;
  z-index: 100; pointer-events: none;
}

/* 手机按钮 */
#phoneBtn {
  position: fixed; bottom: 30px; right: 30px;
  width: 70px; height: 70px;
  background: rgba(0,100,255,0.3);
  border: 2px solid rgba(0,100,255,0.5);
  border-radius: 50%; z-index: 95;
  display: none; align-items: center; justify-content: center;
  font-size: 2em; color: rgba(255,255,255,0.7);
  cursor: pointer;
}
#phoneBtn.show { display: flex; }
#phoneBtn:active {
  background: rgba(0,100,255,0.5);
  transform: scale(0.9);
}

/* 老师回头警告 */
#teacherWarning {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  border: 4px solid transparent;
  z-index: 80; pointer-events: none;
  transition: border-color 0.2s;
}
#teacherWarning.warn {
  border-color: rgba(255, 0, 0, 0.5);
  animation: warningPulse 0.5s infinite;
}
@keyframes warningPulse {
  0%, 100% { border-color: rgba(255,0,0,0.3); }
  50% { border-color: rgba(255,0,0,0.7); }
}

/* 脉冲动画 */
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(1.05); }
}

/* 视角锁定提示 */
#lookAtTeacher {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  color: rgba(255,255,255,0.5); font-size: 1em;
  z-index: 100; pointer-events: none;
  opacity: 0; transition: opacity 0.3s;
}
#lookAtTeacher.show { opacity: 1; }

/* 闪屏效果 */
#flashOverlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: #fff; z-index: 4000;
  opacity: 0; pointer-events: none;
  transition: opacity 0.05s;
}
</style>
</head>
<body>

<!-- 开始界面 -->
<div id="startScreen">
  <h1>📚 上课偷玩手机</h1>
  <div class="subtitle">一堂让你心跳加速的课...</div>
  <div class="rules">
    📱 <span>触屏滑动</span> — 移动视角<br>
    📱 <span>点击手机按钮</span> — 拿出/收起手机<br>
    👀 <span>注意老师动向</span> — 被发现就完了<br>
    ⚠️ <span>老师回头时</span> — 赶紧收起手机！<br>
    💀 <span>被抓到3次</span> — 游戏结束
  </div>
  <button id="startBtn">开始上课</button>
</div>

<!-- HUD -->
<div id="hud" class="hidden">
  <div class="hud-item">⏱️ <span id="timeDisplay">00:00</span></div>
  <div class="hud-item" id="score">📱 得分: <span id="scoreValue">0</span></div>
  <div class="hud-item">❤️ <span id="lives">❤️❤️❤️</span></div>
</div>


<div id="dangerLevel">⚠️ 老师在看你！</div>
<div id="teacherWarning"></div>
<div id="lookAtTeacher">👀 老师好像在看你...</div>
<div id="touchHint">👆 滑动屏幕移动视角</div>
<div id="toast"></div>
<div id="flashOverlay"></div>

<!-- 手机按钮 -->
<div id="phoneBtn">📱</div>

<!-- 手机UI -->
<div id="phoneUI">
  <div id="phoneScreen">
    <div class="time" id="phoneTime">12:00</div>
    <div style="display:flex;flex-wrap:wrap;justify-content:center;">
      <div class="app-icon">🎮</div>
      <div class="app-icon">💬</div>
      <div class="app-icon">🎵</div>
      <div class="app-icon">📷</div>
      <div class="app-icon">📱</div>
      <div class="app-icon">🌐</div>
    </div>
    <div style="margin-top:10px;color:#666;font-size:0.8em;">正在偷玩中...</div>
  </div>
</div>

<!-- JumpScare -->
<div id="jumpScareOverlay">
  <div id="jumpScareFace">👹</div>
</div>

<!-- 游戏结束 -->
<div id="gameOverScreen">
  <h2>💀 你被抓到了！</h2>
  <div class="stats">
    存活时间: <span id="finalTime">00:00</span><br>
    最终得分: <span id="finalScore">0</span><br>
    偷玩次数: <span id="finalPlays">0</span>
  </div>
  <button id="restartBtn">再来一次</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============ 游戏全局状态 ============
const GameState = {
  MENU: 0, PLAYING: 1, CAUGHT: 2, GAMEOVER: 3
};

let state = GameState.MENU;
let score = 0;
let lives = 3;
let gameTime = 0;
let phoneActive = false;
let phonePlayTime = 0;
let totalPlays = 0;
let wasPhoneActive = false; // 记录老师回头前是否玩过手机

// 视角控制
let yaw = 0;    // 水平旋转
let pitch = 0;  // 垂直旋转
const PITCH_LIMIT = Math.PI / 4;
const YAW_LIMIT = Math.PI / 3;

// 触屏控制
let touchStartX = 0, touchStartY = 0;
let isTouching = false;
let lastTouchX = 0, lastTouchY = 0;

// 老师状态
const TeacherState = {
  TEACHING: 0,    // 面向黑板讲课（背对学生）
  FAKE_TURN: 1,   // 假动作 - 半转身吓唬
  QUICK_PEEK: 2,  // 偷袭 - 快速回头扫一眼
  TURNING: 3,     // 真的转头看学生
  WATCHING: 4,    // 盯着学生
  APPROACHING: 5, // 走过来抓人
  SCARING: 6,     // JumpScare
  RETURNING: 7    // 回讲台
};
let teacherState = TeacherState.TEACHING;
let teacherTimer = 0;
let teacherTurnProgress = 0;
let teacherWatchDuration = 0;
let teacherApproachProgress = 0;
let teacherDifficulty = 1;
let nextTurnTime = 5; // 预计算的下一次回头时间

// 恐怖效果
let flickerTimer = 0;
let flickerActive = false;
let heartbeatRate = 0;

// Three.js
let scene, camera, renderer;
let teacherGroup, phoneModel, playerHands;
let classroomLights = [];
let clock;

// 音频
let audioCtx;
let ambientOsc, heartbeatOsc;

// ============ 初始化Three.js ============
function initThree() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x111111);
  scene.fog = new THREE.Fog(0x111111, 8, 25);
  
  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 1.1, 4.5); // 学生视角，坐在教室中间
  
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.8;
  document.body.insertBefore(renderer.domElement, document.body.firstChild);
  
  clock = new THREE.Clock();
  
  // 灯光
  const ambientLight = new THREE.AmbientLight(0x222233, 0.3);
  scene.add(ambientLight);
  
  // 天花板日光灯
  for (let i = -1; i <= 1; i++) {
    const light = new THREE.PointLight(0xffffee, 0.6, 15);
    light.position.set(i * 3, 2.8, 0);
    light.castShadow = true;
    light.shadow.mapSize.width = 512;
    light.shadow.mapSize.height = 512;
    scene.add(light);
    classroomLights.push(light);
    
    // 灯管模型
    const tubeGeo = new THREE.BoxGeometry(1.2, 0.05, 0.15);
    const tubeMat = new THREE.MeshBasicMaterial({ color: 0xffffdd });
    const tube = new THREE.Mesh(tubeGeo, tubeMat);
    tube.position.copy(light.position);
    scene.add(tube);
  }
  
  // 讲台上的灯
  const boardLight = new THREE.SpotLight(0xffffcc, 0.5, 10, Math.PI / 4);
  boardLight.position.set(0, 2.8, -3);
  boardLight.target.position.set(0, 1.5, -4.5);
  scene.add(boardLight);
  scene.add(boardLight.target);
  
  buildClassroom();
  buildTeacher();
  buildPlayerBody();
  buildPhone();
  
  window.addEventListener('resize', onResize);
}

// ============ 构建教室 ============
function buildClassroom() {
  // 地板
  const floorGeo = new THREE.PlaneGeometry(10, 12);
  const floorMat = new THREE.MeshStandardMaterial({ 
    color: 0x8B7355, roughness: 0.8, metalness: 0.1 
  });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);
  
  // 天花板
  const ceilGeo = new THREE.PlaneGeometry(10, 12);
  const ceilMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.9 });
  const ceil = new THREE.Mesh(ceilGeo, ceilMat);
  ceil.rotation.x = Math.PI / 2;
  ceil.position.y = 3;
  scene.add(ceil);
  
  // 后墙
  const wallMat = new THREE.MeshStandardMaterial({ color: 0xE8DCC8, roughness: 0.9 });
  const backWall = new THREE.Mesh(new THREE.PlaneGeometry(10, 3), wallMat);
  backWall.position.set(0, 1.5, 6);
  backWall.receiveShadow = true;
  scene.add(backWall);
  
  // 前墙（黑板所在）
  const frontWall = new THREE.Mesh(new THREE.PlaneGeometry(10, 3), wallMat);
  frontWall.position.set(0, 1.5, -6);
  frontWall.rotation.y = Math.PI;
  scene.add(frontWall);
  
  // 左墙
  const sideWallMat = new THREE.MeshStandardMaterial({ color: 0xD8CCB8, roughness: 0.9 });
  const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(12, 3), sideWallMat);
  leftWall.position.set(-5, 1.5, 0);
  leftWall.rotation.y = Math.PI / 2;
  scene.add(leftWall);
  
  // 右墙
  const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(12, 3), sideWallMat);
  rightWall.position.set(5, 1.5, 0);
  rightWall.rotation.y = -Math.PI / 2;
  scene.add(rightWall);
  
  // 黑板
  const boardGeo = new THREE.BoxGeometry(5, 2, 0.1);
  const boardMat = new THREE.MeshStandardMaterial({ color: 0x1a3a1a, roughness: 0.3, metalness: 0.1 });
  const board = new THREE.Mesh(boardGeo, boardMat);
  board.position.set(0, 1.8, -5.9);
  scene.add(board);
  
  // 黑板边框
  const frameMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.5 });
  const frameTop = new THREE.Mesh(new THREE.BoxGeometry(5.2, 0.08, 0.15), frameMat);
  frameTop.position.set(0, 2.82, -5.88);
  scene.add(frameTop);
  
  // 黑板上的勾股定理内容（用Canvas纹理）
  const chalkCanvas = document.createElement('canvas');
  chalkCanvas.width = 512;
  chalkCanvas.height = 256;
  const ctx = chalkCanvas.getContext('2d');
  ctx.fillStyle = '#1a3a1a';
  ctx.fillRect(0, 0, 512, 256);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 28px serif';
  ctx.textAlign = 'center';
  ctx.fillText('勾股定理', 256, 40);
  ctx.font = '22px serif';
  ctx.fillText('直角三角形中：', 256, 80);
  ctx.font = 'bold 26px serif';
  ctx.fillText('a² + b² = c²', 256, 120);
  ctx.font = '20px serif';
  ctx.fillText('其中 c 为斜边，a、b 为直角边', 256, 160);
  ctx.font = '18px serif';
  ctx.fillText('例：3² + 4² = 5²', 256, 200);
  ctx.fillText('    9 + 16 = 25 ✓', 256, 235);
  
  const chalkTexture = new THREE.CanvasTexture(chalkCanvas);
  const chalkMat = new THREE.MeshBasicMaterial({ map: chalkTexture, transparent: true });
  const chalkPlane = new THREE.Mesh(new THREE.PlaneGeometry(4.5, 1.8), chalkMat);
  chalkPlane.position.set(0, 1.8, -5.84);
  scene.add(chalkPlane);
  
  // 讲台
  const podiumGeo = new THREE.BoxGeometry(3, 0.3, 1);
  const podiumMat = new THREE.MeshStandardMaterial({ color: 0x654321, roughness: 0.6 });
  const podium = new THREE.Mesh(podiumGeo, podiumMat);
  podium.position.set(0, 0.15, -5);
  podium.castShadow = true;
  podium.receiveShadow = true;
  scene.add(podium);
  
  // 讲桌
  const deskGeo = new THREE.BoxGeometry(1.5, 0.8, 0.6);
  const deskMat = new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.5 });
  const desk = new THREE.Mesh(deskGeo, deskMat);
  desk.position.set(0, 0.7, -4.7);
  desk.castShadow = true;
  scene.add(desk);
  
  // 学生桌椅（其他学生）
  const chairMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.6 });
  const tableMat = new THREE.MeshStandardMaterial({ color: 0xA0522D, roughness: 0.5 });
  
  for (let row = 0; row < 3; row++) {
    for (let col = -1; col <= 1; col++) {
      if (row === 2 && col === 0) continue; // 玩家位置跳过
      const x = col * 2;
      const z = -1 + row * 2.5;
      
      // 桌子
      const table = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.06, 0.6), tableMat);
      table.position.set(x, 0.75, z);
      table.castShadow = true;
      table.receiveShadow = true;
      scene.add(table);
      
      // 桌腿
      for (let dx of [-0.5, 0.5]) {
        for (let dz of [-0.25, 0.25]) {
          const leg = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.75, 0.04), tableMat);
          leg.position.set(x + dx, 0.375, z + dz);
          scene.add(leg);
        }
      }
      
      // 椅子
      const chairSeat = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.04, 0.4), chairMat);
      chairSeat.position.set(x, 0.45, z + 0.5);
      scene.add(chairSeat);
      
      const chairBack = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.5, 0.04), chairMat);
      chairBack.position.set(x, 0.7, z + 0.7);
      scene.add(chairBack);
      
      // 椅腿
      for (let dx of [-0.15, 0.15]) {
        for (let dz of [-0.15, 0.15]) {
          const cleg = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.45, 0.03), chairMat);
          cleg.position.set(x + dx, 0.225, z + 0.5 + dz);
          scene.add(cleg);
        }
      }
      
    }
  }
  
  // 玩家的桌子
  const playerTable = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.06, 0.6), tableMat);
  playerTable.position.set(0, 0.75, 4);
  playerTable.castShadow = true;
  playerTable.receiveShadow = true;
  scene.add(playerTable);
  
  // 桌上的书《如何得到富婆青睐》
  const bookCanvas = document.createElement('canvas');
  bookCanvas.width = 256;
  bookCanvas.height = 64;
  const bctx = bookCanvas.getContext('2d');
  bctx.fillStyle = '#cc3333';
  bctx.fillRect(0, 0, 256, 64);
  bctx.fillStyle = '#ffdd00';
  bctx.font = 'bold 20px sans-serif';
  bctx.textAlign = 'center';
  bctx.fillText('如何得到富婆青睐', 128, 38);
  const bookTexture = new THREE.CanvasTexture(bookCanvas);
  
  const book = new THREE.Mesh(
    new THREE.BoxGeometry(0.25, 0.04, 0.35),
    new THREE.MeshStandardMaterial({ map: bookTexture })
  );
  book.position.set(-0.35, 0.80, 4);
  book.rotation.y = 0.3;
  book.castShadow = true;
  scene.add(book);
  
  // 书的侧面（红色书脊）
  const bookSpine = new THREE.Mesh(
    new THREE.BoxGeometry(0.04, 0.04, 0.35),
    new THREE.MeshStandardMaterial({ color: 0xaa2222 })
  );
  bookSpine.position.set(-0.46, 0.80, 4);
  bookSpine.rotation.y = 0.3;
  scene.add(bookSpine);
  
  for (let dx of [-0.5, 0.5]) {
    for (let dz of [-0.25, 0.25]) {
      const leg = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.75, 0.04), tableMat);

// ============ 触屏控制 ============
function initTouchControls() {
  const canvas = renderer.domElement;
  
  canvas.addEventListener('touchstart', (e) => {
    if (state !== GameState.PLAYING) return;
    e.preventDefault();
    const touch = e.touches[0];
    touchStartX = touch.clientX;
    touchStartY = touch.clientY;
    lastTouchX = touch.clientX;
    lastTouchY = touch.clientY;
    isTouching = true;
  }, { passive: false });
  
  canvas.addEventListener('touchmove', (e) => {
    if (state !== GameState.PLAYING || !isTouching) return;
    e.preventDefault();
    const touch = e.touches[0];
    const dx = touch.clientX - lastTouchX;
    const dy = touch.clientY - lastTouchY;
    
    const sensitivity = 0.003;
    yaw += dx * sensitivity;
    pitch += dy * sensitivity;
    
    // 限制视角范围
    yaw = Math.max(-YAW_LIMIT, Math.min(YAW_LIMIT, yaw));
    pitch = Math.max(-PITCH_LIMIT, Math.min(PITCH_LIMIT * 0.5, pitch));
    
    lastTouchX = touch.clientX;
    lastTouchY = touch.clientY;
  }, { passive: false });
  
  canvas.addEventListener('touchend', (e) => {
    isTouching = false;
  });
  
  // 鼠标控制（PC调试）
  let mouseDown = false;
  canvas.addEventListener('mousedown', (e) => {
    if (state !== GameState.PLAYING) return;
    mouseDown = true;
    lastTouchX = e.clientX;
    lastTouchY = e.clientY;
  });
  canvas.addEventListener('mousemove', (e) => {
    if (state !== GameState.PLAYING || !mouseDown) return;
    const dx = e.clientX - lastTouchX;
    const dy = e.clientY - lastTouchY;
    const sensitivity = 0.003;
    yaw += dx * sensitivity;
    pitch += dy * sensitivity;
    yaw = Math.max(-YAW_LIMIT, Math.min(YAW_LIMIT, yaw));
    pitch = Math.max(-PITCH_LIMIT, Math.min(PITCH_LIMIT * 0.5, pitch));
    lastTouchX = e.clientX;
    lastTouchY = e.clientY;
  });
  canvas.addEventListener('mouseup', () => { mouseDown = false; });
}

// ============ 老师AI ============
function updateTeacher(dt) {
  teacherTimer += dt;
  
  switch (teacherState) {
    case TeacherState.TEACHING:
      // 背对学生，面向黑板讲课
      teacherGroup.rotation.y = lerp(teacherGroup.rotation.y, Math.PI, dt * 3);
      
      // 讲课动画 - 轻微晃动
      const teachBob = Math.sin(teacherTimer * 2) * 0.02;
      teacherGroup.position.y = teachBob;
      
      // 手臂写字动画
      const rightArm = teacherGroup.getObjectByName('rightArm');
      const chalk = teacherGroup.getObjectByName('chalk');
      if (rightArm) {
        rightArm.rotation.x = Math.sin(teacherTimer * 3) * 0.3 - 0.5;
        rightArm.rotation.z = Math.sin(teacherTimer * 1.5) * 0.2;
      }
      if (chalk) {
        chalk.position.y = 0.55 + Math.sin(teacherTimer * 3) * 0.05;
      }
      
      // ===== 新回头机制：节奏感 + 压迫感 =====
      // 难度递增：每30秒+1级，最高3级
      teacherDifficulty = Math.min(3, 1 + Math.floor(gameTime / 30));
      const diff = teacherDifficulty;
      
      if (teacherTimer > nextTurnTime) {
        // 随机决定行为
        const rand = Math.random();
        
        // 假动作：10%起步，每级+15%（最高40%）
        const fakeChance = 0.10 + (diff - 1) * 0.15;
        // 连续回头：10%起步，每级+10%（最高30%）
        const doubleChance = fakeChance + 0.10 + (diff - 1) * 0.10;
        
        if (rand < fakeChance) {
          // 假动作 - 半转身吓唬
          teacherState = TeacherState.FAKE_TURN;
          teacherTimer = 0;
          teacherTurnProgress = 0;
          playSound('creak');
        } else if (rand < doubleChance) {
          // 连续回头 - 回头看一次，转回去，马上又回头
          teacherState = TeacherState.TURNING;
          teacherTimer = 0;
          teacherTurnProgress = 0;
          // 标记这次是连续回头中的第一次
          teacherGroup.userData = { isDoubleTurn: true };
          playSound('creak');
        } else {
          // 正常回头检查
          teacherState = TeacherState.TURNING;
          teacherTimer = 0;
          teacherTurnProgress = 0;
          teacherGroup.userData = { isDoubleTurn: false };
          playSound('creak');
        }
        
        // 下次回头间隔：3-6秒起步，地狱模式1-3秒
        nextTurnTime = (3 - (diff - 1) * 0.8) + Math.random() * (3 - (diff - 1) * 0.8);
        nextTurnTime = Math.max(1, nextTurnTime);
      }
      break;
      
    case TeacherState.FAKE_TURN:
      // 假动作 - 老师半转身又转回去，纯吓唬（不会真抓）
      teacherTurnProgress += dt * 1.5;
      const fakeAngle = Math.sin(teacherTurnProgress * Math.PI) * Math.PI * 0.4;
      teacherGroup.rotation.y = Math.PI - fakeAngle;
      
      if (teacherTurnProgress >= 1) {
        teacherGroup.rotation.y = Math.PI;
        teacherState = TeacherState.TEACHING;
        teacherTimer = 0;
        nextTurnTime = 2.5 + Math.random() * 2;
      }
      break;
      
    case TeacherState.TURNING:
      // 从面向黑板转过来面向学生（缓慢转头，制造紧张感）
      teacherTurnProgress += dt * 1.2;
      const turnAngle = Math.PI - teacherTurnProgress * Math.PI;
      teacherGroup.rotation.y = turnAngle;
      
      if (teacherTurnProgress >= 1) {
        teacherGroup.rotation.y = 0; // 面向学生
        teacherState = TeacherState.WATCHING;
        teacherTimer = 0;
        teacherWatchDuration = 1.5 + Math.random() * 2.5 / teacherDifficulty;
        playSound('footstep');
        
        // 显示警告
        document.getElementById('dangerLevel').classList.add('show');
        document.getElementById('teacherWarning').classList.add('warn');
      }
      break;
      
    case TeacherState.WATCHING:
      // 面向学生，盯着看
      teacherGroup.rotation.y = 0;
      
      // 记录老师回头时是否正在玩手机
      if (teacherTimer < 0.1) {
        wasPhoneActive = phoneActive;
      }
      
      // 老师检测逻辑（简单直接）
      if (phoneActive) {
        // 正在玩手机 - 被抓！
        const detectionTime = 0.5 + Math.random() * 0.3;
        if (teacherTimer > detectionTime) {
          teacherState = TeacherState.APPROACHING;
          teacherTimer = 0;
          teacherApproachProgress = 0;
          playSound('heartbeat');
          document.getElementById('dangerLevel').textContent = '⚠️ 老师发现你了！';
        }
      } else if (wasPhoneActive && !phoneActive) {
        // 刚收起手机 - 有概率被抓
        if (teacherTimer > 0.3) {
          if (Math.random() < 0.3) {
            teacherState = TeacherState.APPROACHING;
            teacherTimer = 0;
            teacherApproachProgress = 0;
            playSound('heartbeat');
            document.getElementById('dangerLevel').textContent = '💢 老师看到你收手机了！';
          }
        }
      } else {
        // 没玩手机 - 安全
        document.getElementById('lookAtTeacher').classList.add('show');
      }
      
      // 看够了转回去
      if (teacherTimer > teacherWatchDuration && !phoneActive) {
        // 连续回头机制：如果是连续回头中的第一次，马上再回头
        const isDoubleTurn = teacherGroup.userData && teacherGroup.userData.isDoubleTurn;
        
        if (isDoubleTurn) {
          // 马上再回头！给玩家1秒的反应时间
          teacherState = TeacherState.TURNING;
          teacherTimer = 0;
          teacherTurnProgress = 0;
          teacherGroup.userData = { isDoubleTurn: false };
          showToast('😱 老师又回头了！');
          playSound('creak');
        } else {
          teacherState = TeacherState.TEACHING;
          teacherTimer = 0;
        }
        
        wasPhoneActive = false;
        document.getElementById('dangerLevel').classList.remove('show');
        document.getElementById('teacherWarning').classList.remove('warn');
        document.getElementById('lookAtTeacher').classList.remove('show');
        document.getElementById('dangerLevel').textContent = '⚠️ 老师在看你！';
      }
      break;
      
    case TeacherState.APPROACHING:
      // 老师走过来（缓慢逼近，制造压迫感）
      teacherApproachProgress += dt * 0.6;
      
      // 老师从讲台走到玩家面前（面向学生）
      const startZ = -4.5;
      const endZ = 3.5;
      const currentZ = startZ + (endZ - startZ) * easeInQuad(Math.min(teacherApproachProgress, 1));
      teacherGroup.position.z = currentZ;
      teacherGroup.rotation.y = 0; // 面向学生
      
      // 走路动画
      const walkBob = Math.sin(teacherTimer * 8) * 0.05;
      teacherGroup.position.y = walkBob;
      
      // 灯光闪烁加剧
      flickerActive = true;
      
      // 画面逐渐变暗，制造压迫感
      const darkness = teacherApproachProgress * 0.5;
      renderer.toneMappingExposure = Math.max(0.2, 0.8 - darkness);
      
      // 心跳加速
      heartbeatRate = Math.min(3, 0.5 + teacherApproachProgress * 2.5);
      
      if (teacherApproachProgress >= 1) {
        teacherState = TeacherState.SCARING;
        teacherTimer = 0;
        triggerJumpScare();
      }
      break;
      
    case TeacherState.SCARING:
      // JumpScare状态
      teacherGroup.position.y = 0; // 重置y坐标
      if (teacherTimer > 2) {
        teacherState = TeacherState.RETURNING;
        teacherTimer = 0;
        lives--;
        updateLivesDisplay();
        
        // 强制收起手机
        if (phoneActive) {
          phoneActive = false;
          phoneModel.visible = false;
          document.getElementById('phoneUI').classList.remove('show');
          document.getElementById('phoneBtn').textContent = '📱';
        }
        
        document.getElementById('jumpScareOverlay').classList.remove('show');
        document.getElementById('dangerLevel').classList.remove('show');
        document.getElementById('teacherWarning').classList.remove('warn');
        document.getElementById('lookAtTeacher').classList.remove('show');
        flickerActive = false;
        heartbeatRate = 0;
        renderer.toneMappingExposure = 0.8; // 恢复画面亮度
        
        // 恢复游戏状态，让玩家可以继续操作
        state = GameState.PLAYING;
        
        if (lives <= 0) {
          gameOver();
        } else {
          showToast(`💀 被抓到了！还剩 ${lives} 条命`);
        }
      }
      break;
      
    case TeacherState.RETURNING:
      // 老师走回讲台，然后转回面向黑板
      teacherGroup.position.y = lerp(teacherGroup.position.y, 0, dt * 5);
      const retStartZ = teacherGroup.position.z;
      const retEndZ = -4.5;
      teacherGroup.position.z = lerp(retStartZ, retEndZ, dt * 1.5);
      
      // 先面向学生走回去，到了讲台再转身面向黑板
      if (Math.abs(teacherGroup.position.z - retEndZ) < 0.5) {
        teacherGroup.rotation.y = lerp(teacherGroup.rotation.y, Math.PI, dt * 3);
      } else {
        teacherGroup.rotation.y = 0;
      }
      
      if (Math.abs(teacherGroup.position.z - retEndZ) < 0.1) {
        teacherGroup.position.z = retEndZ;
        teacherGroup.rotation.y = Math.PI; // 确保面向黑板
        teacherState = TeacherState.TEACHING;
        teacherTimer = 0;
        document.getElementById('dangerLevel').textContent = '⚠️ 老师在看你！';
      }
      break;
  }
  
  // 更新老师面部表情
  updateTeacherFace();
}

function updateTeacherFace() {
  const mouth = teacherGroup.getObjectByName('mouth');
  const eyes = teacherGroup.children.filter(c => c.name === 'eye');
  
  if (!mouth) return;
  
  if (teacherState === TeacherState.SCARING) {
    // 恐怖表情 - 嘴巴张大，眼睛变红
    mouth.scale.set(3, 5, 1);
    mouth.material.color.setHex(0xff0000);
    eyes.forEach(eye => {
      eye.material.color.setHex(0xff0000);
      eye.scale.set(2, 2, 2);
    });
  } else if (teacherState === TeacherState.APPROACHING) {
    // 生气表情
    mouth.scale.set(2, 2, 1);
    mouth.material.color.setHex(0xff3333);
    eyes.forEach(eye => {
      eye.material.color.setHex(0x440000);
      eye.scale.set(1.5, 1.5, 1.5);
    });
  } else if (teacherState === TeacherState.WATCHING) {
    // 严肃表情
    mouth.scale.set(1.5, 0.5, 1);
    mouth.material.color.setHex(0x8B0000);
    eyes.forEach(eye => {
      eye.material.color.setHex(0x000000);
      eye.scale.set(1, 1, 1);
    });
  } else {
    // 正常讲课表情
    const talkScale = 1 + Math.sin(teacherTimer * 5) * 0.3;
    mouth.scale.set(1, talkScale, 1);
    mouth.material.color.setHex(0x8B0000);
    eyes.forEach(eye => {
      eye.material.color.setHex(0x000000);
      eye.scale.set(1, 1, 1);
    });
  }
}

// ============ JumpScare ============
function triggerJumpScare() {
  state = GameState.CAUGHT;
  
  // 根据连击数决定恐怖程度
  let horrorLevel = 1;
  if (combo >= 10) horrorLevel = 3;
  else if (combo >= 5) horrorLevel = 2;
  
  // 显示JumpScare
  const overlay = document.getElementById('jumpScareOverlay');
  const face = document.getElementById('jumpScareFace');
  
  // 根据恐怖等级选择脸
  const normalFaces = ['👹', '😱', '💀'];
  const scaryFaces = ['🤡', '😈', '👺', '💀'];
  const terrifyingFaces = ['👹', '🤡', '👺', '🎭', '💀'];
  
  let faces = normalFaces;
  if (horrorLevel === 2) faces = scaryFaces;
  if (horrorLevel === 3) faces = terrifyingFaces;
  
  face.textContent = faces[Math.floor(Math.random() * faces.length)];
  face.style.fontSize = (12 + horrorLevel * 3) + 'em';
  
  overlay.classList.add('show');
  
  // 闪屏效果（根据恐怖等级增强）
  const flash = document.getElementById('flashOverlay');
  const flashCount = horrorLevel * 2;
  for (let i = 0; i < flashCount; i++) {
    setTimeout(() => {
      flash.style.opacity = i % 2 === 0 ? '1' : '0.3';
      flash.style.background = i % 3 === 0 ? '#ff0000' : '#fff';
    }, i * 80);
  }
  setTimeout(() => { 
    flash.style.opacity = '0';
    flash.style.background = '#fff';
  }, flashCount * 80 + 100);
  
  // 播放恐怖音效（根据等级变调）
  playSound('scream');
  if (horrorLevel >= 2) {
    setTimeout(() => playSound('scream'), 200);
  }
  
  // 屏幕抖动（根据等级增强）
  let shakeCount = 0;
  const shakeIntensity = 20 + horrorLevel * 15;
  const shakeInterval = setInterval(() => {
    const shakeX = (Math.random() - 0.5) * shakeIntensity;
    const shakeY = (Math.random() - 0.5) * shakeIntensity;
    const rotate = (Math.random() - 0.5) * (horrorLevel * 5);
    overlay.style.transform = `translate(${shakeX}px, ${shakeY}px) rotate(${rotate}deg)`;
    shakeCount++;
    if (shakeCount > 15 + horrorLevel * 5) {
      clearInterval(shakeInterval);
      overlay.style.transform = '';
    }
  }, 40);
}

// ============ 恐怖效果 ============
function updateHorrorEffects(dt) {
  // 灯光闪烁
  if (flickerActive) {
    flickerTimer += dt * 15;
    classroomLights.forEach((light, i) => {
      const flicker = Math.sin(flickerTimer + i * 2) * 0.5 + 0.5;
      light.intensity = 0.1 + flicker * 0.8;
    });
  } else {
    // 正常微弱闪烁
    classroomLights.forEach((light, i) => {
      const subtle = Math.sin(gameTime * 0.5 + i) * 0.05;
      light.intensity = 0.6 + subtle;
    });
  }
  
  // 随机恐怖事件
  if (Math.random() < 0.001 * teacherDifficulty) {
    // 突然闪一下灯
    classroomLights.forEach(light => {
      light.intensity = 0;
    });
    setTimeout(() => {
      classroomLights.forEach(light => {
        light.intensity = 0.6;
      });
    }, 100 + Math.random() * 200);
  }
  
  // 手机亮光效果
  if (phoneActive) {
    phoneModel.children.forEach(child => {
      if (child.name === 'phoneScreen') {
        child.material.color.setHex(
          Math.random() > 0.95 ? 0x4488ff : 0x1a1a3e
        );
      }
    });
  }
  
  // 心跳音效
  if (heartbeatRate > 0) {
    playHeartbeat(heartbeatRate);
  }
}

// ============ 音频系统 ============
function initAudio() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch(e) {
    console.log('音频初始化失败');
  }
}

function playSound(type) {
  if (!audioCtx) return;
  
  try {
    switch(type) {
      case 'creak': {
        // 门吱呀声
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.5);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        break;
      }
      case 'footstep': {
        // 脚步声
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(80, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        break;
      }
      case 'scream': {
        // 尖叫音效
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.1);
        osc.frequency.linearRampToValueAtTime(200, audioCtx.currentTime + 0.5);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.8);
        
        // 噪声层
        const bufferSize = audioCtx.sampleRate * 0.5;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = (Math.random() * 2 - 1) * 0.3;
        }
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        const noiseGain = audioCtx.createGain();
        noiseGain.gain.setValueAtTime(0.08, audioCtx.currentTime);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
        noise.connect(noiseGain).connect(audioCtx.destination);
        noise.start(); noise.stop(audioCtx.currentTime + 0.5);
        break;
      }
      case 'heartbeat': {
        // 心跳声
        playHeartbeat(1);
        break;
      }
    }
  } catch(e) {
    // 静默处理音频错误
  }
}

let lastHeartbeatTime = 0;
function playHeartbeat(rate) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const interval = 1 / rate;
  
  if (now - lastHeartbeatTime < interval * 0.8) return;
  lastHeartbeatTime = now;
  
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(50, now);
    osc.frequency.exponentialRampToValueAtTime(30, now + 0.15);
    gain.gain.setValueAtTime(0.12, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(); osc.stop(now + 0.15);
    
    // 第二拍
    setTimeout(() => {
      if (!audioCtx) return;
      try {
        const osc2 = audioCtx.createOscillator();
        const gain2 = audioCtx.createGain();
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(40, audioCtx.currentTime);
        gain2.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc2.connect(gain2).connect(audioCtx.destination);
        osc2.start(); osc2.stop(audioCtx.currentTime + 0.1);
      } catch(e) {}
    }, 150);
  } catch(e) {}
}

// ============ 游戏逻辑 ============
function updateGame(dt) {
  // 更新视角（始终更新）
  camera.rotation.order = 'YXZ';
  camera.rotation.y = -yaw;
  camera.rotation.x = pitch;
  
  if (state === GameState.CAUGHT) {
    // 被抓状态 - 只更新老师动画，不更新游戏逻辑
    updateTeacher(dt);
    updateHorrorEffects(dt);
    return;
  }
  
  if (state !== GameState.PLAYING) return;
  
  gameTime += dt;
  
  // 更新时间显示
  const mins = Math.floor(gameTime / 60);
  const secs = Math.floor(gameTime % 60);
  document.getElementById('timeDisplay').textContent = 
    `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
  
  // 更新老师AI
  updateTeacher(dt);
  
  // 更新恐怖效果
  updateHorrorEffects(dt);
  
  // 手机得分（简单直接）
  if (phoneActive) {
    phonePlayTime += dt;
    score = Math.floor(phonePlayTime * 10);
    document.getElementById('scoreValue').textContent = score;
  }
  
  // 更新时钟指针
  const hourHand = scene.getObjectByName('hourHand');
  const minuteHand = scene.getObjectByName('minuteHand');
  if (hourHand && minuteHand) {
    const totalMinutes = gameTime * 1;
    minuteHand.rotation.z = -(totalMinutes % 60) * (Math.PI / 30);
    hourHand.rotation.z = -((totalMinutes / 60) % 12) * (Math.PI / 6);
  }
  
  
  // 手部动画 - 拿手机时手移到中间
  if (playerHands) {
    const leftArm = playerHands.getObjectByName('playerLeftArm');
    const leftHand = playerHands.getObjectByName('playerLeftHand');
    const rightArm = playerHands.getObjectByName('playerRightArm');
    const rightHand = playerHands.getObjectByName('playerRightHand');
    
    if (phoneActive) {
      // 双手移到手机位置
      [leftArm, leftHand, rightArm, rightHand].forEach(h => {
        if (h) {
          h.position.x = lerp(h.position.x, 0.15, dt * 5);
          h.position.z = lerp(h.position.z, -0.45, dt * 5);
        }
      });
    } else {
      // 手回到正常位置
      if (leftArm) { leftArm.position.x = lerp(leftArm.position.x, -0.35, dt * 3); leftArm.position.z = lerp(leftArm.position.z, -0.3, dt * 3); }
      if (leftHand) { leftHand.position.x = lerp(leftHand.position.x, -0.35, dt * 3); leftHand.position.z = lerp(leftHand.position.z, -0.4, dt * 3); }
      if (rightArm) { rightArm.position.x = lerp(rightArm.position.x, 0.35, dt * 3); rightArm.position.z = lerp(rightArm.position.z, -0.3, dt * 3); }
      if (rightHand) { rightHand.position.x = lerp(rightHand.position.x, 0.35, dt * 3); rightHand.position.z = lerp(rightHand.position.z, -0.4, dt * 3); }
    }
  }
}

// ============ UI工具 ============
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function updateLivesDisplay() {
  const hearts = '❤️'.repeat(lives) + '🖤'.repeat(3 - lives);
  document.getElementById('lives').textContent = hearts;
}

// ============ 游戏流程 ============
function startGame() {
  initAudio();
  
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('phoneBtn').classList.add('show');
  
  state = GameState.PLAYING;
  score = 0;
  lives = 3;
  gameTime = 0;
  phonePlayTime = 0;
  totalPlays = 0;
  phoneActive = false;
  wasPhoneActive = false;
  teacherState = TeacherState.TEACHING;
  teacherTimer = 0;
  nextTurnTime = 3 + Math.random() * 5;
  flickerActive = false;
  heartbeatRate = 0;
  yaw = 0;
  pitch = 0;
  
  updateLivesDisplay();
  document.getElementById('scoreValue').textContent = '0';
  
  showToast('📚 上课了...偷偷玩手机吧！');
  
  // 3秒后隐藏触屏提示
  setTimeout(() => {
    document.getElementById('touchHint').style.opacity = '0';
  }, 5000);
}

function gameOver() {
  state = GameState.GAMEOVER;
  
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('phoneBtn').classList.remove('show');
  document.getElementById('phoneUI').classList.remove('show');
  document.getElementById('dangerLevel').classList.remove('show');
  document.getElementById('teacherWarning').classList.remove('warn');
  
  const mins = Math.floor(gameTime / 60);
  const secs = Math.floor(gameTime % 60);
  document.getElementById('finalTime').textContent = 
    `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalPlays').textContent = totalPlays;
  
  setTimeout(() => {
    document.getElementById('gameOverScreen').classList.add('show');
  }, 500);
}

function restartGame() {
  document.getElementById('gameOverScreen').classList.remove('show');
  
  // 重置老师位置
  teacherGroup.position.set(0, 0, -4.5);
  teacherGroup.rotation.y = 0;
  
  // 重置灯光
  classroomLights.forEach(light => { light.intensity = 0.6; });
  
  startGame();
}

// ============ 工具函数 ============
function lerp(a, b, t) { return a + (b - a) * t; }
function easeInQuad(t) { return t * t; }

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ============ 主循环 ============
function animate() {
  requestAnimationFrame(animate);
  
  const dt = Math.min(clock.getDelta(), 0.1);
  
  updateGame(dt);
  renderer.render(scene, camera);
}

// ============ 启动 ============
initThree();
initTouchControls();

// 按钮事件绑定（避免touch+click双触发）
function bindButton(id, handler) {
  const btn = document.getElementById(id);
  let touched = false;
  btn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    touched = true;
    handler();
  }, { passive: false });
  btn.addEventListener('click', (e) => {
    if (!touched) handler();
    touched = false;
  });
}

bindButton('startBtn', startGame);
bindButton('phoneBtn', togglePhone);
bindButton('restartBtn', restartGame);

animate();
</script>
